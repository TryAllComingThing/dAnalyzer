[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 详细输出
addopts = -v --tb=short

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    p0: 核心路径 — 每次提交运行
    p1: 重要路径 — 每日运行
    p2: 覆盖路径 — 发版前运行
    p3: 深度路径 — 专项测试

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 日志
log_cli = false
log_cli_level = INFO
