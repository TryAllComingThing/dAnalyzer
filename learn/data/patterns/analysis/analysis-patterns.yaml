# 模式生成规则
generation_rules:
  min_frequency: 5
  min_co_occurrence: 0.7

# 索引
_count: 0
_last_updated: "2026-04-25"

# 常见分析套路参考
common_patterns:
  sales_trend:
    indicators: ["销售额", "销售量"]
    dimensions: ["月份", "日期"]
    description: "销售趋势分析"

  region_comparison:
    indicators: ["销售额", "占比"]
    dimensions: ["区域", "省份"]
    description: "区域对比分析"

  product_ranking:
    indicators: ["销售额", "排名"]
    dimensions: ["产品", "类目"]
    description: "产品排名分析"

  conversion_funnel:
    indicators: ["访客数", "下单数", "支付数"]
    dimensions: ["步骤"]
    description: "转化漏斗分析"

