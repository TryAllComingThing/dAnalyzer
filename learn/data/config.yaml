# learn/data/config.yaml
# dAnalyzer 学习系统配置

# 系统配置
system:
  # 模式检测配置
  pattern_detection:
    # 触发间隔 (分析次数)
    trigger_interval: 50
    # 触发时间 (小时)
    trigger_hours: 1

  # 数据保留策略
  retention:
    observations_days: 30  # 观察记录保留30天
    patterns_days: 90      # 模式保留90天

# 模式检测阈值
thresholds:
  # 查询模式
  query_pattern:
    min_frequency: 3      # 最小出现次数
    similarity: 0.8       # 相似度阈值

  # 分析模式
  analysis_pattern:
    min_frequency: 5
    co_occurrence: 0.7    # 共现率

  # 错误模式
  error_pattern:
    min_occurrences: 2

  # 行业模式
  industry_pattern:
    min_frequency: 3

# Instinct 配置
instinct:
  # 最低置信度 (SessionStart 加载)
  min_confidence_session: 0.8

  # 最低置信度 (智能建议)
  min_confidence_suggestion: 0.3

# 存储路径
paths:
  observations: "learn/data/observations"
  patterns: "learn/data/patterns"
  instincts: "learn/data/instincts"
  signals: "learn/data/signals"
  counters: "learn/data/counters"
  hypotheses: "learn/data/hypotheses"
  proximity: "learn/data/proximity"
  evolution_log: "learn/data/evolution-log"

# ============================================================
# 自进化配置 (v4)
# ============================================================
evolution:
  schema_version: 2

  # ---- 信号采集 ----
  signal:
    correction_replacement_ratio: 0.5       # 部分重叠纠正阈值
    user_decay_enabled: true                # 单用户信号衰减
    reinforcement_min_turns: 2              # 强化信号最少交互轮次
    counterfactual_top_candidates: 15       # 反事实检测回溯候选数

  # ---- 聚类与假设生成 ----
  hypothesis:
    trigger_weekly_signals: 50              # 周信号增量触发阈值
    trigger_schedule: "0 9 * * 1"           # 每周一 9am
    cluster_min_frequency: 3                # 聚类最小出现次数
    extension_min_frequency: 5              # 扩展路径最小出现次数
    l3_fallback_min_frequency: 3            # 知识盲区最小出现次数

  # ---- 置信度 ----
  confidence:
    alpha: 0.35                             # 频次权重
    beta: 0.30                              # 一致性权重
    gamma: 0.20                             # 多样性权重
    delta: 0.15                             # 反事实邻近加分权重
    frequency_sat:                           # 分信号类型的饱和阈值
      correction: 5
      supplement: 5
      refinement: 5
      extension: 8
      l3_fallback: 3
    diversity_sat: 3                        # 跨 session 饱和数

  # ---- 验证 ----
  validation:
    holdout_ratio: 0.25                     # hold-out 比例
    holdout_min_samples: 4                  # 最少样本才分割

  # ---- 应用 ----
  apply:
    confidence_full_apply: 0.90             # full_apply 门槛
    confidence_progressive: 0.70            # progressive_apply 门槛

  # ---- 渐进式权重 ----
  progressive:
    initial_weight: 0.30                    # 渐进起步权重
    weekly_climb: 0.15                      # 每周爬坡增量
    freeze_after_weeks: 3                   # 连续退化 → 冻结
    decay_after_weeks: 8                    # 连续冻结 → 废弃
    template_cooldown_weeks: 4              # 模板内容调整冷却期

  # ---- 语义传播 ----
  propagation:
    proximity_threshold: 0.6                # 邻近度阈值
    propagation_factor: 0.25                # 传播幅度系数
    max_neighbors: 5                        # 最多传播指标数
    cross_industry_factor: 0.125            # 跨行业传播额外折扣

  # ---- 主动学习 (v4.5 feature flag, 默认关闭) ----
  active_learning:
    enabled: false                          # 默认关闭
    confidence_gap_threshold: 0.10          # top-2 得分差距阈值
    max_clarifications_per_session: 3       # 每 session 最多反问次数

  # ---- 监控 ----
  monitoring:
    window_48h_min_samples: 10              # 48h 窗口最小样本量
    l3_degradation_pp: 5                    # L3 退化阈值（百分点）
    correction_degradation_pp: 5            # 纠正率退化阈值
    l1_degradation_pp: 10                   # L1 退化阈值
    single_user_ratio_max: 0.50             # 单用户信号占比告警线
    burst_threshold_24h: 10                 # 24h 突发信号告警线

  # ---- 模板草稿 ----
  draft_template:
    initial_weight: 0.25
    promotion_threshold: 0.60
    defunct_after_weeks: 12
    min_path_complexity: 3

  # ---- 知识库 ----
  knowledge:
    canonical_dir: "knowledge/_canonical"
    active_dir: "knowledge/_active"
    patches_dir: "knowledge/_patches"
    schema_dir: "knowledge/_schemas"

  # ---- 行业迁移 ----
  cross_industry:
    mapping_file: "knowledge/_base/cross_industry_mappings.yaml"
    transfer_weight_factor: 0.25            # 跨行业迁移权重系数
    rapid_decay_on_contradiction: true       # 反向纠正快速衰减

# 版本
version: "2.0"
last_updated: "2026-05-02"
