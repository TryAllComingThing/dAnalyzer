# 不良贷款率指标
id: fin_ind_001
code: npl_ratio
name: 不良贷款率(NPL)
type: indicator
industry: finance
keywords:
  - 不良贷款率
  - NPL
  - 不良率
  - 不良贷款
  - 坏账率
description: |
  金融核心风险指标，不良贷款占总贷款余额的比例。
  计算公式: SUM(CASE WHEN classification IN ('次级','可疑','损失') THEN balance ELSE 0 END) / SUM(balance)
definition:
  formula: SUM(不良贷款余额) / SUM(贷款余额)
  aggregation: RATIO
  unit: '%'
  precision: 2
mapping:
  table: loans
  field: balance
