# 金融行业配置

> 银行/金融行业专用配置

## 行业基础信息

```yaml
industry:
  name: "金融"
  code: "finance"
  version: "1.0"
  maintainer: "金融数据团队"

# 数据源
datasource:
  default: "oracle"
  tables:
    - accounts             # 账户表
    - transactions         # 交易流水
    - loans                # 贷款表
    - customers            # 客户表

# 行业特征
features:
  time_sensitive: true
  real_time_required: false
  seasonal: false
  has_inventory: false
```

## 行业指标

### 规模指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 存款余额 | 存款总余额 | SUM(deposit_balance) |
| 贷款余额 | 贷款总余额 | SUM(loan_balance) |
| 总资产 | 总资产规模 | SUM(assets) |
| 客户数 | 总客户数 | COUNT(DISTINCT customer_id) |
| 账户数 | 总账户数 | COUNT(account_id) |

### 风险指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 不良贷款率(NPL) | 不良贷款占比 | SUM(npl_balance) / SUM(loan_balance) |
| 逾期率 | 逾期贷款比例 | COUNT(overdue) / COUNT(total_loans) |
| 拨备覆盖率 | 拨备/不良贷款 | SUM(provision) / SUM(npl_balance) |
| 坏账率 | 核销坏账比例 | SUM(charge_off) / SUM(loan_balance) |
| 资本充足率 | 资本/风险资产 | capital / risk_weighted_assets |

### 收益指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 净利息收入 | 利息收入-利息支出 | SUM(interest_income - interest_expense) |
| 中间业务收入 | 手续费及佣金 | SUM(fee_income) |
| 净息差(NIM) | 净利息收入/生息资产 | net_interest_income / interest_earning_assets |
| 成本收入比 | 运营成本/营业收入 | SUM(op_cost) / SUM(operating_income) |

## 表结构映射

```yaml
mappings:
  accounts:
    table: "accounts"
    fields:
      账号: "account_id"
      客户: "customer_id"
      账户类型: "account_type"
      余额: "balance"
      开户日期: "open_date"
      状态: "status"
    metrics:
      存款余额: "SUM(balance)"
      账户数: "COUNT(account_id)"

  transactions:
    table: "transactions"
    fields:
      流水号: "txn_id"
      账号: "account_id"
      交易类型: "txn_type"
      金额: "amount"
      手续费: "fee"
      交易日期: "txn_date"
      渠道: "channel"
    metrics:
      交易量: "COUNT(txn_id)"
      交易金额: "SUM(amount)"

  loans:
    table: "loans"
    fields:
      贷款编号: "loan_id"
      客户: "customer_id"
      贷款金额: "loan_amount"
      余额: "balance"
      利率: "interest_rate"
      发放日: "issue_date"
      到期日: "maturity_date"
      五级分类: "classification"
      状态: "status"
    metrics:
      贷款余额: "SUM(balance)"
      不良贷款率: "SUM(CASE WHEN classification IN ('次级','可疑','损失') THEN balance ELSE 0 END) / SUM(balance)"
```

## 分析模板

```yaml
analysis_templates:
  asset_liability:
    name: "资产负债分析"
    steps:
      - query: "资产负债数据"
      - calculate: ["存贷比", "期限结构", "集中度"]
      - analyze: ["资产负债匹配"]

  risk_analysis:
    name: "风险分析"
    steps:
      - query: "风控数据"
      - calculate: ["NPL", "逾期率", "拨备覆盖率"]
      - analyze: ["风险迁徙", "行业集中度"]

  profitability:
    name: "盈利分析"
    steps:
      - query: "营收数据"
      - calculate: ["净息差", "成本收入比", "ROA"]
      - compare: ["同业对比", "历史趋势"]
```
