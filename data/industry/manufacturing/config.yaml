# 制造行业配置

> 生产制造行业专用配置

## 行业基础信息

```yaml
industry:
  name: "制造"
  code: "manufacturing"
  version: "1.0"
  maintainer: "制造数据团队"

# 数据源
datasource:
  default: "mysql"
  tables:
    - production_orders    # 生产工单
    - products             # 产品表
    - production_lines     # 产线表
    - quality_checks       # 质检表

# 行业特征
features:
  time_sensitive: true
  real_time_required: true
  seasonal: false
  has_inventory: true
```

## 行业指标

### 产能指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 产能利用率 | 实际产出/理论产能 | SUM(actual_qty) / SUM(planned_qty) |
| OEE | 设备综合效率 | 可用率 × 性能率 × 良品率 |
| 产出量 | 总生产数量 | SUM(actual_qty) |
| 停机时间 | 设备停机总时长 | SUM(downtime_minutes) |
| 换线时间 | 产线切换时间 | AVG(changeover_minutes) |

### 质量指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 良品率 | 合格品占比 | SUM(pass_qty) / SUM(check_qty) |
| 不良品率 | 不良品占比 | SUM(defect_qty) / SUM(actual_qty) |
| 返工率 | 需返工产品占比 | SUM(rework_qty) / SUM(actual_qty) |
| 客诉率 | 客户投诉比例 | COUNT(complaints) / COUNT(shipments) |

### 成本指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 生产成本 | 总生产成本 | SUM(material_cost + labor_cost + overhead) |
| 单位成本 | 单件产品生产成本 | SUM(total_cost) / SUM(actual_qty) |
| 材料成本率 | 材料成本占比 | SUM(material_cost) / SUM(total_cost) |
| 废品损失 | 不良品造成的损失 | SUM(defect_qty) × unit_cost |

## 表结构映射

```yaml
mappings:
  production_orders:
    table: "production_orders"
    fields:
      工单号: "order_id"
      产品: "product_id"
      产线: "line_id"
      计划量: "planned_qty"
      实际量: "actual_qty"
      不良品: "defect_qty"
      计划开始: "planned_start"
      实际完成: "actual_end"
      状态: "status"
    metrics:
      产出量: "SUM(actual_qty)"
      产能利用率: "SUM(actual_qty) / SUM(planned_qty)"
      不良品率: "SUM(defect_qty) / SUM(actual_qty)"

  quality_checks:
    table: "quality_checks"
    fields:
      质检ID: "check_id"
      工单: "order_id"
      抽检数: "sample_qty"
      合格数: "pass_qty"
      不良原因: "defect_reason"
      检验员: "inspector"
      检验时间: "check_time"
    metrics:
      良品率: "SUM(pass_qty) / SUM(sample_qty)"
```

## 分析模板

```yaml
analysis_templates:
  production_efficiency:
    name: "生产效率分析"
    steps:
      - query: "生产数据"
      - calculate: ["产能利用率", "OEE", "产出趋势"]
      - analyze: ["瓶颈工序识别"]

  quality_analysis:
    name: "质量分析"
    steps:
      - query: "质检数据"
      - calculate: ["良品率", "不良品率"]
      - analyze: ["不良原因分布", "趋势分析"]

  cost_analysis:
    name: "生产成本分析"
    steps:
      - query: "成本数据"
      - calculate: ["单位成本", "成本结构"]
      - compare: ["不同产线成本对比"]
```
