# 电商行业配置

> 电子商务行业专用配置

## 行业基础信息

```yaml
industry:
  name: "电商"
  code: "ecommerce"
  version: "1.0"
  maintainer: "电商数据团队"

# 数据源
datasource:
  default: "hive"
  tables:
    - orders              # 订单表
    - order_items        # 订单明细
    - products           # 商品表
    - users              # 用户表
    - user_actions       # 用户行为

# 行业特征
features:
  time_sensitive: true       # 对时间敏感
  real_time_required: false  # 无需实时
  seasonal: true             # 有季节性
  has_inventory: true        # 有库存概念
```

## 行业指标

> 电商业务核心指标

### 销售指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 销售额 | 已支付订单金额 | SUM(order_amount), status='paid' |
| GMV | 含退款的订单总额 | SUM(order_amount) |
| 订单量 | 已支付订单数量 | COUNT(order_id), status='paid' |
| 客单价 | 平均每单金额 | 销售额 / 订单量 |
| 客单件 | 平均每单商品数 | SUM(sku_quantity) / 订单量 |
| 退款金额 | 已退款金额 | SUM(refund_amount) |
| 退款率 | 退款订单占比 | 退款订单量 / 订单量 |

### 转化指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 浏览量(PV) | 页面访问次数 | COUNT(*) |
| 访客数(UV) | 独立访客数 | COUNT(DISTINCT user_id) |
| 加购率 | 加购用户/浏览用户 | COUNT(cart_user) / COUNT(pv_user) |
| 下单转化率 | 下单用户/加购用户 | COUNT(order_user) / COUNT(cart_user) |
| 付款转化率 | 付款用户/下单用户 | COUNT(paid_user) / COUNT(order_user) |
| 总转化率 | 付款用户/浏览用户 | 加购率 × 下单率 × 付款率 |

### 用户指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| 新增用户 | 新注册用户 | COUNT(user_id), register_date=今日 |
| 活跃用户 | 有行为的用户 | COUNT(DISTINCT user_id), action_count>0 |
| 复购率 | 多次购买用户占比 | 购买>1次用户 / 总购买用户 |
| 留存率 | 次日/7日/30日留存 | 次日活跃 / 当日新增 |

### 库存指标

| 指标 | 定义 | 计算公式 |
|------|------|----------|
| SKU数 | 在售商品数 | COUNT(product_id), status=在售 |
| 动销商品数 | 有销售的商品 | COUNT(DISTINCT product_id), sales>0 |
| 动销率 | 动销/在售 | 动销商品数 / SKU数 |
| 缺货率 | 缺货商品/在售 | 缺货数 / SKU数 |

## 表结构映射

```yaml
mappings:
  orders:
    table: "orders"
    fields:
      销售额: "order_amount"
      订单数: "order_id"
      客户: "user_id"
      地区: "region"
      时间: "order_date"
      商品: "product_id"
      状态: "status"
    metrics:
      销售额: "SUM(order_amount)"
      订单数: "COUNT(DISTINCT order_id)"
      客单价: "AVG(order_amount)"

  products:
    table: "products"
    fields:
      商品ID: "product_id"
      商品名称: "product_name"
      品类: "category"
      价格: "price"
      库存: "stock"
      状态: "status"

  users:
    table: "users"
    fields:
      用户ID: "user_id"
      注册时间: "register_date"
      最后活跃: "last_active_date"
      等级: "user_level"
```

## 分析模板

```yaml
analysis_templates:
  sales_trend:
    name: "销售趋势分析"
    steps:
      - query: "销售数据"
      - calculate: ["日环比", "周同比", "月环比"]
      - detect: ["异常检测"]

  conversion_funnel:
    name: "转化漏斗分析"
    steps:
      - query: "浏览→加购→下单→支付"
      - calculate: ["各环节转化率"]
      - analyze: ["流失节点"]

  user_retention:
    name: "用户留存分析"
    steps:
      - query: "用户行为"
      - calculate: ["次日留存", "7日留存", "30日留存"]
      - segment: ["留存用户特征"]
```

## 洞察模板

```yaml
insight_templates:
  sales_up:
    pattern: "销售.*上升.*%"
    template: "销售{{change}}，{{recommendation}}"
    recommendation:
      up: "建议增加库存，保持增长势头"
      down: "建议分析下降原因，关注竞品动态"

  conversion_down:
    pattern: "转化率.*下降.*%"
    template: "转化率{{change}}%，可能由{{causes}}导致"
    causes: ["促销活动结束", "商品价格上涨", "竞品促销"]
```

