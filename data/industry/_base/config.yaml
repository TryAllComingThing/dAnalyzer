# 基础行业配置

> 所有行业共用的配置项

## 通用设置

```yaml
# 所有行业通用配置
common:
  # 时间格式
  date_format: "YYYY-MM-DD"
  datetime_format: "YYYY-MM-DD HH:mm:ss"

  # 数据精度
  decimal_precision: 2
  percentage_precision: 2

  # 分页默认
  default_page_size: 100
  max_page_size: 10000

  # 超时设置
  query_timeout: 30  # 秒

  # 数据更新频率
  update_frequency:
    real_time: "实时"
    daily: "T+1"
    weekly: "每周"
    monthly: "每月"
```

## 通用字段映射

```yaml
# 所有行业都需要的通用字段
common_fields:
  - field: id
    type: string
    description: "唯一标识"

  - field: create_time
    type: datetime
    description: "创建时间"

  - field: update_time
    type: datetime
    description: "更新时间"

  - field: status
    type: string
    description: "状态"

  - field: remark
    type: string
    description: "备注"
```

