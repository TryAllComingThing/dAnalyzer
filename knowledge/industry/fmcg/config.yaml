# 快消行业配置 (FMCG)

> 快消品行业数据分析配置 — 覆盖食品饮料、日化、个护、烟酒等

## 行业定义

```yaml
industry:
  code: fmcg
  name: 快消
  name_en: Fast Moving Consumer Goods
  trigger_keywords:
    - 销售
    - 订单
    - GMV
    - SKU
    - 品类
    - 渠道
    - 动销
    - 库存周转
    - 铺货
    - 经销商
    - 终端
    - 复购
    - 促销
    - 新品
    - 毛利
    - 净利
    - 客单价
    - 退货
    - 缺货
    - 连带
    - 转化
    - 留存
    - 折扣
    - 优惠券
    - 获客
    - 区域
    - 购物篮
```

## 通用设置

```yaml
common:
  date_format: "YYYY-MM-DD"
  decimal_precision: 2
  percentage_precision: 2
  query_timeout: 30
```

