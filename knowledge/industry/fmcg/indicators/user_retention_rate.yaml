description: 特定周期后仍持续购买的用户比例。快消行业常用7日/30日/90日留存率。高留存率说明产品竞争力强。

definition:
  formula: COUNT(user_id WHERE retained = true) / COUNT(user_id WHERE cohort = start_date) * 100
  unit: "%"
  precision: 2

